name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore MLVScan.DevCLI.csproj
      
    - name: Build
      run: dotnet build MLVScan.DevCLI.csproj -c Release --no-restore
      
    - name: Extract version from release
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          # Extract version from release tag (remove 'v' prefix)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        else
          # Fallback: read from .csproj
          VERSION=$(grep -oP '<Version>\K[^<]+' MLVScan.DevCLI.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi
      shell: bash
      
    - name: Pack
      run: dotnet pack MLVScan.DevCLI.csproj -c Release --no-build -p:PackageVersion=${{ steps.get_version.outputs.version }} -o ./nupkg
      
    - name: Publish to NuGet
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        
    - name: Upload package as artifact
      uses: actions/upload-artifact@v6
      with:
        name: nuget-package
        path: ./nupkg/*.nupkg

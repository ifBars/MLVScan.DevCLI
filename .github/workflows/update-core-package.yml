name: Update MLVScan.Core

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Update MLVScan.Core package
        run: dotnet add MLVScan.DevCLI.csproj package MLVScan.Core

      - name: Bump DevCLI patch version if Core changed
        run: |
          python <<'PY'
          import pathlib
          import re
          import subprocess
          import sys

          csproj = pathlib.Path("MLVScan.DevCLI.csproj")
          diff = subprocess.run(
              ["git", "diff", "--quiet", str(csproj)],
              check=False,
          )

          if diff.returncode == 0:
              print("No package update detected; skipping version bump")
              sys.exit(0)

          content = csproj.read_text(encoding="utf-8")
          match = re.search(r"<Version>(\d+)\.(\d+)\.(\d+)</Version>", content)
          if not match:
              raise SystemExit("Could not find <Version>x.y.z</Version> in project file")

          major, minor, patch = map(int, match.groups())
          next_version = f"{major}.{minor}.{patch + 1}"
          updated = content[:match.start()] + f"<Version>{next_version}</Version>" + content[match.end():]
          csproj.write_text(updated, encoding="utf-8")

          print(f"Bumped package version to {next_version}")
          PY

      - name: Restore dependencies
        run: dotnet restore MLVScan.DevCLI.csproj

      - name: Build DevCLI
        run: dotnet build MLVScan.DevCLI.csproj -c Release --no-restore

      - name: Pack DevCLI
        run: dotnet pack MLVScan.DevCLI.csproj -c Release --no-build

      - name: Commit and push if updated
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet MLVScan.DevCLI.csproj; then
            echo "No updates available"
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            version=$(grep -oP '<Version>\K[^<]+' MLVScan.DevCLI.csproj)
            git add MLVScan.DevCLI.csproj
            git commit -m "chore(deps): update MLVScan.Core and bump DevCLI to ${version}"
            git push
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger auto-release workflow
        if: steps.commit_changes.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run auto-release.yml \
            --ref "${{ github.ref_name }}" \
            --field version="${{ steps.commit_changes.outputs.version }}"
